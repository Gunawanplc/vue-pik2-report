<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>vue-vite-mqtt</title>
    <script type="text/javascript">
      // 1. Ambil URL saat ini
      var path = window.location.pathname;
      
      // 2. Cek apakah kita di GitHub (punya sub-folder)
      // Jika URL mengandung 'vue-pik2-report', kita arahkan kembali ke situ
      if (path.includes('/vue-pik2-report/')) {
        // Simpan sisa path setelah nama repo (misal: 'setting')
        var segment = path.split('/vue-pik2-report/')[1];
        // Arahkan kembali ke root repo dengan menyertakan sisa path tadi
        window.location.replace('/vue-pik2-report/#' + (segment || ''));
      } else {
        // Jika di lokal/Nginx, langsung balik ke root
        window.location.replace('/');
      }
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
