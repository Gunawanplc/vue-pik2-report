<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>vue-vite-mqtt</title>
    <script type="text/javascript">
      // Trik untuk menangani Single Page App (SPA) di GitHub Pages
      // Ini akan mengambil URL yang "error" dan mengarahkannya kembali ke index.html
      // agar Vue Router bisa membacanya.
      var pathSegment = window.location.pathname.split('/')[1];
      window.history.replaceState(null, null, '/' + pathSegment + '/');
    </script>
    <meta http-equiv="refresh" content="0; URL='./'" />
  </head>
  <body>
    Redirecting...
  </body>
</html>
